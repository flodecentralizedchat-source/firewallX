# railway.toml — FirewallX Railway deployment config
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Tell Railway to use our Dockerfile explicitly
# (prevents it from trying nixpacks which won't find the right image)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "./firewallx start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "firewallx"
port = 3000
